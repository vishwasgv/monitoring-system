      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@13.233.231.12 << 'EOF'
            cd monitoring-system
            git pull origin main

            sudo docker stop monitoring-container || true
            sudo docker rm monitoring-container || true

            sudo docker build -t monitoring-app .
            sudo docker run -d -p 80:80 --name monitoring-container monitoring-app
          EOF
